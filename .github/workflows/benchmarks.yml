name: Benchmarks

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  DOTNET_VERSION: '9.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CARGO_TERM_COLOR: always
  GO_VERSION: '1.23'

jobs:
  # ========== .NET Benchmarks ==========
  dotnet-benchmarks:
    name: .NET Benchmarks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dotnet

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Benchmarks
        run: dotnet build benchmarks/MechanicalSympathy.Benchmarks -c Release

      - name: Run Benchmarks
        run: |
          cd benchmarks/MechanicalSympathy.Benchmarks
          dotnet run -c Release --no-build -- \
            --filter "*" \
            --exporters JSON GitHub Markdown \
            --iterationCount 10 \
            --warmupCount 3

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-benchmark-results
          path: dotnet/benchmarks/MechanicalSympathy.Benchmarks/BenchmarkDotNet.Artifacts/

      - name: Extract .NET Results Summary
        id: dotnet-summary
        run: |
          cd benchmarks/MechanicalSympathy.Benchmarks/BenchmarkDotNet.Artifacts/results

          # Find the markdown file and extract key metrics
          MARKDOWN_FILE=$(ls -t *.md 2>/dev/null | head -1)
          if [ -n "$MARKDOWN_FILE" ]; then
            echo "markdown_file=$MARKDOWN_FILE" >> $GITHUB_OUTPUT

            # Wrap the content in a code block for proper rendering
            echo '### .NET Benchmark Results (BenchmarkDotNet)' > /tmp/dotnet-results.md
            echo '' >> /tmp/dotnet-results.md
            echo '```' >> /tmp/dotnet-results.md
            cat "$MARKDOWN_FILE" >> /tmp/dotnet-results.md
            echo '```' >> /tmp/dotnet-results.md
          fi

      - name: Upload .NET Summary
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-summary
          path: /tmp/dotnet-results.md
          if-no-files-found: ignore

  # ========== Rust Benchmarks ==========
  rust-benchmarks:
    name: Rust Benchmarks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rust/target/
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-
            ${{ runner.os }}-cargo-

      - name: Build Benchmarks
        run: cargo build --release --benches

      - name: Run Benchmarks
        run: |
          # Run benchmarks and strip ANSI escape codes
          cargo bench --no-fail-fast -- --noplot 2>&1 | sed 's/\x1b\[[0-9;]*m//g' | tee /tmp/rust-bench-output.txt

      - name: Extract Rust Results Summary
        id: rust-summary
        run: |
          # Parse criterion output and create markdown summary
          cat > /tmp/rust-results.md << 'EOF'
### Rust Benchmark Results (Criterion)

```
EOF

          # Extract benchmark names and timing results
          grep -E "^(false_sharing|single_writer|memory_access)" /tmp/rust-bench-output.txt >> /tmp/rust-results.md || true
          grep -E "^\s+time:" /tmp/rust-bench-output.txt >> /tmp/rust-results.md || true

          echo '```' >> /tmp/rust-results.md

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        with:
          name: rust-benchmark-results
          path: |
            rust/target/criterion/
            /tmp/rust-bench-output.txt

      - name: Upload Rust Summary
        uses: actions/upload-artifact@v4
        with:
          name: rust-summary
          path: /tmp/rust-results.md

  # ========== Go Benchmarks ==========
  go-benchmarks:
    name: Go Benchmarks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run Benchmarks
        run: |
          go test -bench=. -benchmem -run=^$ ./benchmarks/... 2>&1 | tee /tmp/go-bench-output.txt

      - name: Extract Go Results Summary
        id: go-summary
        run: |
          cat > /tmp/go-results.md << 'EOF'
### Go Benchmark Results

```
EOF

          grep -E "^Benchmark" /tmp/go-bench-output.txt >> /tmp/go-results.md || true

          echo '```' >> /tmp/go-results.md

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        with:
          name: go-benchmark-results
          path: /tmp/go-bench-output.txt

      - name: Upload Go Summary
        uses: actions/upload-artifact@v4
        with:
          name: go-summary
          path: /tmp/go-results.md

  # ========== Cross-Language Comparison & PR Report ==========
  comparison-report:
    name: Generate Comparison Report
    runs-on: ubuntu-latest
    needs: [dotnet-benchmarks, rust-benchmarks, go-benchmarks]
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download .NET Results
        uses: actions/download-artifact@v4
        with:
          name: dotnet-benchmark-results
          path: results/dotnet/
        continue-on-error: true

      - name: Download Rust Results
        uses: actions/download-artifact@v4
        with:
          name: rust-benchmark-results
          path: results/rust/
        continue-on-error: true

      - name: Download .NET Summary
        uses: actions/download-artifact@v4
        with:
          name: dotnet-summary
          path: summaries/
        continue-on-error: true

      - name: Download Rust Summary
        uses: actions/download-artifact@v4
        with:
          name: rust-summary
          path: summaries/
        continue-on-error: true

      - name: Download Go Results
        uses: actions/download-artifact@v4
        with:
          name: go-benchmark-results
          path: results/go/
        continue-on-error: true

      - name: Download Go Summary
        uses: actions/download-artifact@v4
        with:
          name: go-summary
          path: summaries/
        continue-on-error: true

      - name: Generate Comparison Report
        id: report
        run: |
          cat > report.md << 'HEADER'
          # Mechanical Sympathy Benchmark Report

          > Cross-language comparison of mechanical sympathy techniques

          ## Overview

          This report compares the effectiveness of mechanical sympathy optimizations across .NET and Rust implementations.

          ### Techniques Benchmarked

          | Technique | Description |
          |-----------|-------------|
          | Cache Line Padding | Prevents false sharing by padding data structures to cache line boundaries |
          | Single Writer Principle | Ensures only one thread writes to mutable state, using message passing |
          | Natural Batching | Processes work in batches to amortize overhead and improve throughput |
          | Sequential Memory Access | Optimizes for CPU prefetching by accessing memory sequentially |

          ---

          HEADER

          # Add .NET results
          echo "## .NET 9 Results" >> report.md
          echo "" >> report.md
          if [ -f summaries/dotnet-results.md ]; then
            cat summaries/dotnet-results.md >> report.md
          else
            echo "*.NET benchmark results not available*" >> report.md
          fi
          echo "" >> report.md
          echo "---" >> report.md
          echo "" >> report.md

          # Add Rust results
          echo "## Rust Results" >> report.md
          echo "" >> report.md
          if [ -f summaries/rust-results.md ]; then
            cat summaries/rust-results.md >> report.md
          else
            echo "*Rust benchmark results not available*" >> report.md
          fi
          echo "" >> report.md
          echo "---" >> report.md
          echo "" >> report.md

          # Add Go results
          echo "## Go Results" >> report.md
          echo "" >> report.md
          if [ -f summaries/go-results.md ]; then
            cat summaries/go-results.md >> report.md
          else
            echo "*Go benchmark results not available*" >> report.md
          fi
          echo "" >> report.md
          echo "---" >> report.md
          echo "" >> report.md

          # Add comparison section
          cat >> report.md << 'COMPARISON'
          ## Cross-Language Comparison

          ### Key Observations

          All three implementations demonstrate the effectiveness of mechanical sympathy techniques:

          1. **False Sharing Prevention**: Cache-padded counters show significant performance improvement over naive implementations in all languages

          2. **Single Writer Principle**: Message-passing architectures eliminate lock contention and provide predictable latency

          3. **Natural Batching**: Batch processing improves throughput by amortizing per-operation overhead

          4. **Sequential Access**: Linear memory traversal outperforms random access patterns due to CPU prefetching

          ### Language-Specific Notes

          - **.NET**: Uses `System.Threading.Channels` for message passing, `StructLayout` for padding
          - **Rust**: Uses `tokio::sync::mpsc` channels, `cache-padded` crate for padding
          - **Go**: Uses native channels for message passing, byte array padding for cache line alignment

          ---

          *Report generated by GitHub Actions*
          COMPARISON

          # Output for PR comment
          echo "report_path=report.md" >> $GITHUB_OUTPUT

      - name: Upload Comparison Report
        uses: actions/upload-artifact@v4
        with:
          name: comparison-report
          path: report.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.md', 'utf8');

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Mechanical Sympathy Benchmark Report')
            );

            const body = report + '\n\n---\n*Commit: ' + context.sha + '*';

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      - name: Update docs/benchmark.md
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          mkdir -p docs
          cp report.md docs/benchmark.md

          # Add timestamp
          echo "" >> docs/benchmark.md
          echo "---" >> docs/benchmark.md
          echo "*Last updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')*" >> docs/benchmark.md

      - name: Commit benchmark report
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update benchmark report [skip ci]"
          file_pattern: docs/benchmark.md
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
